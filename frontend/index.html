<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Optimizer</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/app.js"></script>
  </head>
  <body>
    <header class="brand-header">
      <div class="layout">
        <a class="brand-link" href="index.html" aria-label="ATS Optimizer home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">ATS <strong>Optimizer</strong></span>
        </a>
      </div>
    </header>

    <section class="site-hero">
      <div class="layout">
        <p class="eyebrow">Resume match analyzer</p>
        <h1>Optimize Your Resume for ATS</h1>
        <p class="intro">
          Upload your resume and paste the job description to get an ATS score
          and actionable insights.
        </p>
      </div>
    </section>

    <main class="layout app-shell">
        <form id="analysis-form" novalidate>
          <div class="input-grid">
            <section class="panel input-card" aria-labelledby="resume-card-title">
              <div class="card-heading">
                <span class="step-number" aria-hidden="true">1</span>
                <h2 id="resume-card-title">Upload Your Resume</h2>
              </div>

              <div class="field-group upload-group">
                <label class="upload-zone" for="resume-file">
                  <span class="upload-icon" aria-hidden="true"></span>
                  <span class="upload-title">Drag and drop your resume here</span>
                  <span id="resume-file-help" class="field-help">
                    PDF or DOCX. Maximum size: 5 MB.
                  </span>
                  <span class="choose-file-button">Choose File</span>
                  <input
                    id="resume-file"
                    class="visually-hidden"
                    name="file"
                    type="file"
                    accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
                    aria-describedby="resume-file-help resume-file-error"
                  />
                </label>
                <div id="selected-file" class="selected-file" hidden></div>
                <p id="resume-file-error" class="field-error" aria-live="polite"></p>
              </div>
            </section>

            <section class="panel input-card" aria-labelledby="job-card-title">
              <div class="card-heading card-heading-between">
                <div class="card-heading">
                  <span class="step-number" aria-hidden="true">2</span>
                  <h2 id="job-card-title">Paste Job Description</h2>
                </div>
                <button id="clear-description-button" class="clear-button" type="button">
                  Clear
                </button>
              </div>

              <div class="field-group">
                <label class="visually-hidden" for="job-description">
                  Job description
                </label>
                <textarea
                  id="job-description"
                  name="job_description"
                  rows="10"
                  placeholder="Paste the responsibilities, required skills, and preferred qualifications from the job posting."
                  aria-describedby="job-description-error"
                ></textarea>
                <p id="job-description-error" class="field-error" aria-live="polite"></p>
              </div>
            </section>
          </div>

          <div class="actions">
            <button id="analyze-button" class="primary-action" type="submit">
              Analyze Resume
            </button>
          </div>
        </form>

      <section class="panel results-panel" aria-labelledby="results-title">
        <div class="results-header">
          <div>
            <h2 id="results-title">Results Dashboard</h2>
          </div>
          <p id="status-message" class="status-message" role="status" aria-live="polite">
            Results will appear after a resume is analyzed.
          </p>
        </div>

        <div id="results-content" class="empty-state">
          <p>No analysis yet.</p>
        </div>
      </section>
    </main>

  </body>
</html>
